name: Deploy to AWS EC2

# Trigger: any push to the main branch
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Confirm the push ──────────────────────────────────────────────
      - name: Show commit info
        run: echo "Deploying commit ${{ github.sha }} by ${{ github.actor }}"

      # ── 2. SSH into EC2 and run the deploy script ────────────────────────
      #
      #  appleboy/ssh-action connects to your EC2, runs every line in `script`
      #  exactly as if you typed it in the terminal.
      #  `set -e` means the whole script stops on the first error, so a failed
      #  build will NOT restart PM2 — your live server keeps the old version.
      #
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Load nvm so npm/node are available in this non-interactive SSH session
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "──────────────────────────────────────"
            echo " ZRC CRM Deploy — $(date)"
            echo "──────────────────────────────────────"

            cd /home/ubuntu/zrccc

            # Pull latest code from GitHub (force-sync to avoid local edit conflicts)
            echo "[1/5] Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            # Install / update server dependencies
            echo "[2/5] Installing server dependencies..."
            cd server && npm install --omit=dev && cd ..

            # Build the React frontend
            echo "[3/5] Building React client..."
            cd client && npm install && npm run build && cd ..

            # Restart the Node.js process via PM2
            echo "[4/5] Restarting application..."
            pm2 restart ecosystem.config.js --env production --update-env

            # Reload Nginx to serve new static files
            echo "[5/5] Reloading Nginx..."
            sudo systemctl reload nginx

            echo "✅ Deploy complete!"
